services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: subscription_integration
      POSTGRES_USER: subscription
      POSTGRES_PASSWORD: subscription
    ports:
      - '55432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U subscription -d subscription_integration']
      interval: 2s
      timeout: 3s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data
